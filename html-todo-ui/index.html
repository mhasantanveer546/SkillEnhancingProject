<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO_UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My To-Do List</h1>
    </header>

    <main>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Enter a new task">
            <button id="add-btn">Add</button>
        </div>

        <ul id="todo-list">
            <li>
                <input type="checkbox">
                <span>Buy Milk</span>
                <button class="delete-btn">Delete</button>
            </li>
            <li>
                <input type="checkbox">
                <span>Walk Dog</span>
                <button class="delete-btn">Delete</button>
            </li>
            <li>
                <input type="checkbox">
                <span>Code Project</span>
                <button class="delete-btn">Delete</button>
            </li>
        </ul>
    </main>

    <footer>
        <p>Built by Hasan</p>
    </footer>
</body>
</html>
